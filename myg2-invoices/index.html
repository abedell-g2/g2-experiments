<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyG2 Invoices — G2 Experiments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Figtree, sans-serif; background: #f5f4fb; color: #1a1a2e; }
    .banner { background: #5746b2; color: white; text-align: center; padding: 8px 16px; font-size: 13px; font-weight: 600; position: sticky; top: 0; z-index: 9999; }
    .banner a { color: white; text-decoration: underline; }
    header { background: #5746b2; color: white; padding: 32px 48px; }
    header h1 { font-size: 28px; font-weight: 800; }
    header p { font-size: 15px; opacity: 0.85; margin-top: 6px; }
    main { max-width: 960px; margin: 48px auto; padding: 0 24px; }
    h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #5746b2; margin-bottom: 16px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 48px; }
    .card { background: white; border-radius: 12px; border: 1.5px solid #e5e3f0; padding: 24px; text-decoration: none; color: inherit; transition: border-color 0.15s, box-shadow 0.15s; display: block; }
    .card:hover { border-color: #5746b2; box-shadow: 0 4px 20px rgba(87,70,178,0.12); }
    .card-tag { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; background: #f0eeff; color: #5746b2; border-radius: 20px; padding: 3px 10px; margin-bottom: 12px; }
    .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
    .card p { font-size: 13px; color: #666; line-height: 1.5; }
    .card-meta { font-size: 12px; color: #999; margin-top: 14px; }
    .placeholder { background: white; border-radius: 12px; border: 1.5px dashed #c8c3e8; padding: 48px 24px; text-align: center; color: #999; font-size: 14px; }
    footer { text-align: center; padding: 32px; font-size: 13px; color: #999; border-top: 1px solid #e5e3f0; }
  </style>
</head>
<body>
  <div class="banner">
    🧪 G2 Experiment — MyG2 Invoices &nbsp;·&nbsp; <a href="../index.html">Back to Experiments</a>
  </div>
  <header>
    <h1>MyG2 Invoices</h1>
    <p>Experiments for the payments &amp; invoices section of MyG2 (my.g2.test/:product/payments/invoices).</p>
  </header>
  <main>
    <h2>Experiments</h2>
    <div class="grid">
      <div class="placeholder">No experiments yet — captures will appear here.</div>
    </div>
  </main>
  <footer>Internal use only — G2 Design Experiments</footer>
</body>
</html>
